<body>

<!-- PAGE 1: AUTH -->
<div id="page-auth" class="page active">
  <h2>User Authentication</h2>

  <label>User Type:</label>
  <select id="userType">
    <option value="">Select</option>
    <option value="tcs">TCS</option>
    <option value="agency">Agency</option>
    <option value="school">School Authority</option>
  </select>

  <div id="schoolRole" style="display:none;">
    <label>Designation:</label>
    <select id="designation">
      <option>Principal</option>
      <option>Coordinator</option>
    </select>
  </div>

  <button onclick="goToPage('page-school')">Next</button>
</div>


<!-- PAGE 2: SCHOOL INFO -->
<div id="page-school" class="page">
  <h2>School Information</h2>

  <input placeholder="School Name" id="schoolName"/>
  <input placeholder="UDISE Code" id="udise"/>
  <input placeholder="City" id="city"/>
  <input placeholder="State" id="state"/>

  <button onclick="goBack('page-auth')">Back</button>
  <button onclick="goToPage('page-scan')">Next</button>
</div>


<!-- PAGE 3: SCAN -->
<div id="page-scan" class="page">
  <h2>Scan Documents</h2>

  <video id="camera" autoplay></video>
  <button onclick="startCamera()">Open Camera</button>
  <button onclick="capture()">Scan</button>

  <div id="preview"></div>

  <button onclick="goBack('page-school')">Back</button>
  <button onclick="goToPage('page-final')">Next</button>
</div>


<!-- PAGE 4: FINAL -->
<div id="page-final" class="page">
  <h2>Preview & Submit</h2>

  <div id="finalPreview"></div>

  <button onclick="goBack('page-scan')">Back</button>
  <button onclick="submitData()">Submit</button>
</div>

</body>
